<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 萌宠几何风 #2: 圆润小团子 -->
  <!-- 主体：超圆身体 + 小耳朵 + 大眼睛 + AI 光环 -->
  <g>
    <!-- AI 光环 -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="#6C5CE7" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5"/>
    <!-- 耳朵 -->
    <ellipse cx="32" cy="22" rx="8" ry="10" fill="#A29BFE" transform="rotate(-20 32 22)"/>
    <ellipse cx="68" cy="22" rx="8" ry="10" fill="#A29BFE" transform="rotate(20 68 22)"/>
    <!-- 身体 -->
    <circle cx="50" cy="52" r="30" fill="#A29BFE"/>
    <!-- 大眼睛 -->
    <ellipse cx="38" cy="48" rx="6" ry="7" fill="#2D2D2D"/>
    <ellipse cx="62" cy="48" rx="6" ry="7" fill="#2D2D2D"/>
    <!-- 星星高光 -->
    <circle cx="40" cy="46" r="2.5" fill="#FFFFFF"/>
    <circle cx="64" cy="46" r="2.5" fill="#FFFFFF"/>
    <circle cx="36" cy="50" r="1" fill="#FFFFFF"/>
    <circle cx="60" cy="50" r="1" fill="#FFFFFF"/>
    <!-- 微笑 -->
    <path d="M 42 60 Q 50 66 58 60" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
